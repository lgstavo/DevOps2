apiVersion: v1
kind: Service
metadata:
  name: {{.Release.Name}}-{{.Values.global.backend.name}}
  labels:
    run: {{.Release.Name}}-{{.Values.global.backend.name}}
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: {{.Release.Name}}-{{.Values.global.backend.name}}