kind: Service
metadata:
  name: {{.Release.Name}}-{{.Values.global.frontend.name}}
  labels:
    run: {{.Release.Name}}-{{.Values.global.frontend.name}}
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: {{.Release.Name}}-{{.Values.global.frontend.name}}