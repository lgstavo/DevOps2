apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Release.Name}}-db
  labels:
    app: {{.Release.Name}}-db
spec:
  selector:
    matchLabels:
      app: {{.Release.Name}}-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{.Release.Name}}-db
    spec:
      containers:
      - name: {{.Release.Name}}-db
        image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 3306
        env:
          # --- Dados Sensíveis vindo do Secret ---
          - name: MYSQL_ROOT_PASSWORD 
            valueFrom:
              secretKeyRef:
                name: {{.Release.Name}}-db-secrets
                key: MYSQL_ROOT_PASSWORD
          
          - name: MYSQL_USER 
            valueFrom:
              secretKeyRef:
                name: {{.Release.Name}}-db-secrets
                key: DB_USER # Usando a mesma chave criada no exemplo anterior
          
          - name: MYSQL_PASSWORD 
            valueFrom:
              secretKeyRef:
                name: {{.Release.Name}}-db-secrets
                key: DB_PASSWORD
          
          # --- Dados Não Sensíveis vindo do ConfigMap ---
          - name: MYSQL_DATABASE 
            valueFrom:
              configMapKeyRef:
                name: {{.Release.Name}}-db-configmap
                key: DB_NAME
                
        resources:
          requests:
            memory: "1Gi"
            cpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2"
        volumeMounts:
          - name: {{.Release.Name}}-persistent-storage
            mountPath: /var/lib/mysql
      volumes:
        - name: {{.Release.Name}}-persistent-storage
          persistentVolumeClaim:
            claimName: {{.Release.Name}}-pv-claim